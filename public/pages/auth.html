<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Belt Hub – Sign in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <script defer src="app.js"></script>
</head>
<body data-page="auth">
  <div id="app">
    <section class="page" id="page-auth">
      <h2 class="title">Sign in or create account</h2>
      <div class="card">
        <label class="field">
          <span>Email</span>
          <input type="email" id="auth-email" />
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" id="auth-password" />
        </label>
        <button class="btn primary" id="btn-login">Continue</button>
      </div>
      <a class="btn text as-link" href="welcome.html">Back</a>
    </section>
  </div>
</body>
</html>
