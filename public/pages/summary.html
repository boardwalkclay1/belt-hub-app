<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Belt Hub – Ride Summary</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <script defer src="app.js"></script>
</head>
<body data-page="summary">
  <div id="app">
    <section class="page" id="page-summary">
      <h2 class="title">Ride summary</h2>
      <div class="card">
        <p><strong>Bike:</strong> <span id="summary-bike-id">#14</span></p>
        <p><strong>Duration:</strong> <span id="summary-duration">00:32:15</span></p>
        <p><strong>Cost:</strong> $<span id="summary-cost">13.40</span></p>
        <p><strong>Deposit held:</strong> $100.00</p>
        <p><strong>Deposit returned:</strong> $<span id="summary-return">86.60</span></p>
      </div>
      <a class="btn primary as-link" href="home.html">Done</a>
    </section>
  </div>
</body>
</html>
