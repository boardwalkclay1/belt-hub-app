<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Belt Hub – Ride Summary</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles/style.css" />
</head>

<body data-page="summary">
  <div id="app">
    <section class="page" id="page-summary">
      <h2 class="title">Ride summary</h2>

      <div class="card">
        <p><strong>Bike:</strong> <span id="summary-bike-id"></span></p>
        <p><strong>Duration:</strong> <span id="summary-duration"></span></p>
        <p><strong>Cost:</strong> $<span id="summary-cost"></span></p>
        <p><strong>Deposit returned:</strong> $<span id="summary-return"></span></p>

        <p id="sync-status" class="note">Preparing to sync…</p>
      </div>

      <a class="btn primary as-link" href="home.html">Done</a>
    </section>
  </div>

  <script type="module">
    document.addEventListener("DOMContentLoaded", () => {
      const data = JSON.parse(localStorage.getItem("lastRide"));

      document.getElementById("summary-bike-id").textContent = `#${data.bikeId}`;
      document.getElementById("summary-duration").textContent = data.duration;
      document.getElementById("summary-cost").textContent = data.cost.toFixed(2);
      document.getElementById("summary-return").textContent = data.returned.toFixed(2);

      document.getElementById("sync-status").textContent = "Ready for backend sync.";
    });
  </script>
</body>
</html>
