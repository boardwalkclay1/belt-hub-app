<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Belt Hub – Ride History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <script type="module">
    import { getSession } from "./modules/auth.js";

    // placeholder for backend fetch
    document.addEventListener("DOMContentLoaded", () => {
      const user = getSession();
      if (!user) window.location.href = "auth.html";

      // backend will replace this
      document.getElementById("history-list").innerHTML =
        `<p class="note">Loading your rides…</p>`;
    });
  </script>
</head>
<body>
  <div id="app">
    <section class="page">
      <h2 class="title">Ride History</h2>
      <div id="history-list" class="card"></div>
      <a class="btn text as-link" href="home.html">Back</a>
    </section>
  </div>
</body>
</html>
