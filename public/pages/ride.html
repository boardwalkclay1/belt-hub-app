<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Belt Hub – Active Ride</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <script defer src="app.js"></script>
</head>
<body data-page="ride">
  <div id="app">
    <section class="page" id="page-ride">
      <h2 class="title">You’re riding</h2>
      <p class="subtitle">Bike <span id="ride-bike-id">#14</span></p>

      <div class="timer-ring">
        <div class="timer-time" id="ride-timer">00:00:00</div>
      </div>
      <p class="note">
        $25 per hour. A $100 deposit is held until you end your ride.
      </p>

      <button class="btn danger" id="btn-end-ride">End Ride</button>
    </section>
  </div>
</body>
</html>
